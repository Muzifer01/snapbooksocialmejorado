<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapBookSocial - Inicio</title>
    <style>
        :root {
            --bg-black: #000000;
            --card-white: #ffffff;
            --text-main: #1c1e21;
            --text-muted: #65676b;
            --accent: #007AFF;
            --poll-bg: #f0f2f5;
            --poll-bar: rgba(0, 122, 255, 0.2);
            
            /* Mood Colors */
            --mood-hot: linear-gradient(135deg, #ff4b2b 0%, #ff416c 100%);
            --mood-relax: linear-gradient(135deg, #2193b0 0%, #6dd5ed 100%);
            --mood-drama: linear-gradient(135deg, #8e2de2 0%, #4a00e0 100%);
            --mood-tech: linear-gradient(135deg, #000428 0%, #004e92 100%);
            --mood-default: #000000;
            
            /* Mood Accent Colors */
            --accent-hot: #ff4b2b;
            --accent-relax: #2193b0;
            --accent-drama: #8e2de2;
            --accent-tech: #00f2fe;
            --current-accent: var(--accent);
        }

        /* MOOD BACKGROUNDS */
        body.mood-hot { background: var(--mood-hot); --current-accent: var(--accent-hot); }
        body.mood-relax { background: var(--mood-relax); --current-accent: var(--accent-relax); }
        body.mood-drama { background: var(--mood-drama); --current-accent: var(--accent-drama); }
        body.mood-tech { background: var(--mood-tech); --current-accent: var(--accent-tech); }

        /* PARTÍCULAS FLOTANTES */
        .particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            pointer-events: none;
        }

        @keyframes float-up {
            0% {
                opacity: 1;
                transform: translateY(0) translateX(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-100vh) translateX(var(--tx)) scale(0.5);
            }
        }

        @keyframes float-down {
            0% {
                opacity: 0;
                transform: translateY(-10px) scale(0);
            }
            50% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateY(100vh) scale(1);
            }
        }

        body {
            margin: 0;
            background-color: var(--bg-black);
            font-family: -apple-system, system-ui, sans-serif;
            color: white;
            transition: background 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        body.mood-active {
            background-attachment: fixed;
        }

        /* FONDO DINÁMICO CON AURA */
        body::before {
            content: "";
            position: fixed;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 50%);
            animation: auraRotate 25s linear infinite;
            pointer-events: none;
            z-index: -1;
        }
        
        @keyframes auraRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* HEADER */
        .header {
            padding: 20px 20px 10px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            position: sticky; 
            top: 0; 
            z-index: 100;
            transition: all 0.5s ease;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .header.scrolled {
            background: rgba(0,0,0,0.4);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .header h1 { 
            font-size: 24px; 
            margin: 0; 
            font-weight: 800; 
            letter-spacing: -1px;
        }

        /* MOOD BAR PREMIUM GLASSMORPHISM RESTORED */
        .mood-bar-container {
            margin-top: 15px;
            overflow-x: auto;
            padding: 5px 0 15px;
            scrollbar-width: none;
        }
        .mood-bar-container::-webkit-scrollbar { display: none; }
        
        .mood-bar {
            display: flex;
            gap: 12px;
            padding: 2px 10px;
        }
        
        .mood-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px) saturate(150%);
            -webkit-backdrop-filter: blur(15px) saturate(150%);
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            padding: 6px 16px;
            border-radius: 50px; /* Forma de cápsula perfecta */
            color: white;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: 800;
            font-size: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        /* Colores por Mood */
        .mood-item[data-mood="hot"] { border-color: rgba(255, 75, 43, 0.4); }
        .mood-item[data-mood="relax"] { border-color: rgba(33, 147, 176, 0.4); }
        .mood-item[data-mood="drama"] { border-color: rgba(142, 45, 226, 0.4); }
        .mood-item[data-mood="tech"] { border-color: rgba(0, 242, 254, 0.4); }

        .mood-item:hover {
            transform: translateY(-3px) scale(1.05);
            background: rgba(255, 255, 255, 0.15);
        }
        
        .mood-item.active {
            transform: scale(1.1) translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-color: white;
        }

        /* Colores Activos con Resplandor */
        .mood-item.active[data-mood="all"] { background: white; color: black; box-shadow: 0 0 20px rgba(255,255,255,0.4); }
        .mood-item.active[data-mood="hot"] { background: #ff4b2b; color: white; box-shadow: 0 0 20px rgba(255, 75, 43, 0.6); }
        .mood-item.active[data-mood="relax"] { background: #2193b0; color: white; box-shadow: 0 0 20px rgba(33, 147, 176, 0.6); }
        .mood-item.active[data-mood="drama"] { background: #8e2de2; color: white; box-shadow: 0 0 20px rgba(142, 45, 226, 0.6); }
        .mood-item.active[data-mood="tech"] { background: #00f2fe; color: black; box-shadow: 0 0 20px rgba(0, 242, 254, 0.6); }
        
        .mood-emoji {
            font-size: 16px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }
        
        .mood-label {
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1.5px;
            font-weight: 900;
        }



        /* CONTENEDOR DE POSTS */
        #feed-container {
            padding: 20px 15px 120px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* ESTILOS DE LA TARJETA GLASSMORPHISM ULTRA */
        .post-card {
            background: rgba(255, 255, 255, 0.12); /* Mucho más transparente */
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border-radius: 28px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            color: white; /* Texto blanco para resaltar sobre el cristal */
            animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
        }
        
        .post-card:hover {
            transform: translateY(-5px) scale(1.01);
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 15px 50px rgba(0,0,0,0.4);
        }

        /* GLOW DINÁMICO SEGÚN MOOD */
        body.mood-hot .post-card { border-left: 4px solid #ff4b2b; box-shadow: 0 10px 40px rgba(255, 75, 43, 0.2); }
        body.mood-relax .post-card { border-left: 4px solid #2193b0; box-shadow: 0 10px 40px rgba(33, 147, 176, 0.2); }
        body.mood-drama .post-card { border-left: 4px solid #8e2de2; box-shadow: 0 10px 40px rgba(142, 45, 226, 0.2); }
        body.mood-tech .post-card { border-left: 4px solid #00f2fe; box-shadow: 0 10px 40px rgba(0, 242, 254, 0.2); }

        /* Ajuste de textos internos para el cristal */
        .post-body { color: rgba(255, 255, 255, 0.95); font-weight: 500; }
        .post-time { color: rgba(255, 255, 255, 0.6); }

        /* NICKS CON CONTRASTE MÁXIMO */
        .post-nick { 
            font-weight: 900; 
            font-size: 17px;
            color: white !important;
            -webkit-text-fill-color: white !important;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            letter-spacing: 0.3px;
        }
        
        body.mood-active .post-nick {
            color: white !important;
            -webkit-text-fill-color: white !important;
            text-shadow: 0 0 15px var(--current-accent), 0 2px 10px rgba(0,0,0,0.8);
        }

        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .post-avatar { 
            width: 45px; height: 45px; background: #f0f2f5; 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; font-weight: bold; color: var(--accent); 
            overflow: hidden; 
        }
        .post-avatar img { width: 100%; height: 100%; object-fit: cover; user-select: none; -webkit-user-drag: none; }
        .post-meta { display: flex; flex-direction: column; }
        .post-nick-container { display: flex; align-items: center; gap: 8px; }
        .platform-tag {
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.7;
        }
        .platform-tag.android::before { content: "🤖"; }
        .platform-tag.iphone::before { content: "🍎"; }
        .platform-tag.pc::before { content: "💻"; }
        .platform-tag.mac::before { content: "🖥️"; }
        .platform-tag.web::before { content: "🌐"; }
        .platform-tag span { display: none; }
        .post-time { font-size: 11px; color: var(--text-muted); }
        .post-body { font-size: 15px; line-height: 1.4; margin-bottom: 12px; word-wrap: break-word; }
        .post-published-image { 
            width: 100%; 
            border-radius: 16px; 
            margin-bottom: 12px; 
            max-height: 400px; 
            object-fit: cover; 
            user-select: none; 
            -webkit-user-drag: none; 
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* ESTILOS DE ENCUESTA */
        .poll-container {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .poll-option {
            position: relative;
            background: rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 12px 15px;
            cursor: pointer;
            overflow: hidden;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 600;
            transition: 0.2s;
        }
        .poll-bar {
            position: absolute;
            top: 0; left: 0; bottom: 0;
            background: var(--poll-bar);
            z-index: 0;
            transition: width 0.6s ease;
        }
        .poll-text { position: relative; z-index: 1; }
        .poll-percent { position: relative; z-index: 1; font-size: 12px; color: var(--accent); }

        .post-footer {
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            padding: 12px 0 0 0;
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: flex-end;
        }

        .action-btn { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            color: var(--text-muted); 
            font-size: 14px; 
            font-weight: 700; 
            cursor: pointer;
            background: rgba(0, 0, 0, 0.03);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            padding: 8px 16px;
            transition: all 0.2s;
        }
        
        .action-btn:hover {
            background: rgba(0, 0, 0, 0.06);
            transform: scale(1.05);
        }
        .action-btn img { width: 20px; height: 20px; }
        .action-btn.liked { color: #FF0000; }
        .action-btn.commented { color: var(--accent); }

        /* MODAL DE COMENTARIOS */
        .comments-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            align-items: flex-end;
            justify-content: center;
        }
        .comments-modal.open { display: flex; }
        .comments-content {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 100%;
            max-width: 500px;
            border-radius: 25px 25px 0 0;
            padding: 25px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            color: #1c1e21;
            border-top: 1px solid rgba(255, 255, 255, 0.5);
        }
        .comments-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .comments-list { overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px; }
        .comment-item { display: flex; gap: 10px; align-items: flex-start; }
        .comment-avatar { width: 36px; height: 36px; border-radius: 50%; background: #f0f2f5; overflow: hidden; flex-shrink: 0; }
        .comment-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .comment-bubble { background: #f0f2f5; border-radius: 15px; padding: 8px 12px; font-size: 14px; }
        .comment-bubble strong { display: block; font-size: 12px; color: var(--accent); }
        .comment-input-area { display: flex; gap: 10px; border-top: 1px solid #eee; padding-top: 10px; }
        .comment-input-area input { flex: 1; border: 1px solid #ddd; border-radius: 20px; padding: 10px 15px; outline: none; }
        .comment-send-btn { background: var(--accent); color: white; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; }

        /* INDICADOR DE ESCRITURA */
        .typing-indicator {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 5px 10px;
            font-size: 12px;
            color: var(--accent);
            font-weight: 600;
        }
        .typing-indicator.active { display: flex; }
        .typing-dots { display: flex; gap: 3px; }
        .typing-dot {
            width: 4px; height: 4px; background: var(--accent);
            border-radius: 50%; animation: typingBounce 1.4s infinite ease-in-out;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* NAV BAR PREMIUM FLOATING CAPSULE */
        .nav-bar {
            position: fixed; 
            bottom: 25px; /* Separada del borde inferior */
            left: 20px; 
            right: 20px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            display: flex; 
            justify-content: space-around; 
            align-items: center;
            padding: 12px 10px; 
            z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50px; /* Cápsula perfecta */
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            max-width: 500px;
            margin: 0 auto; /* Centrada en pantallas grandes */
        }
        
        .nav-item { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-decoration: none; 
            color: rgba(255,255,255,0.4); 
            gap: 4px;
            transition: all 0.3s ease;
        }
        
        .nav-item.active { 
            color: white; 
            transform: translateY(-2px);
        }
        
        .nav-item img { 
            width: 22px; 
            height: 22px; 
            opacity: 0.4; 
            transition: 0.3s; 
        }
        
        .nav-item.active img { 
            opacity: 1; 
            filter: drop-shadow(0 0 10px var(--current-accent)); 
        }
        
        body.mood-active .nav-item.active { color: var(--current-accent); }
        body.mood-active .nav-item.active img { filter: drop-shadow(0 0 10px var(--current-accent)) brightness(1.2); }
        
        .nav-item span { 
            font-size: 9px; 
            font-weight: 800; 
            letter-spacing: 1.2px;
            text-transform: uppercase;
        }
        
        .btn-add {
            width: 50px; 
            height: 50px; 
            background: white;
            border-radius: 50%; 
            display: flex; 
            align-items: center;
            justify-content: center; 
            font-size: 28px; 
            color: black;
            text-decoration: none; 
            box-shadow: 0 8px 25px rgba(255,255,255,0.3);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 3px solid rgba(0,0,0,0.1);
        }
        
        body.mood-active .btn-add {
            background: white;
            color: var(--current-accent);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2), 0 0 15px var(--current-accent);
        }
        
        .btn-add:hover { 
            transform: scale(1.15) rotate(90deg);
            box-shadow: 0 10px 30px rgba(255,255,255,0.5);
        }

        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .weekly-challenge { background: rgba(255,255,255,0.08); backdrop-filter: blur(15px); border-radius: 16px; padding: 15px; margin: 15px 0; border: 1px solid rgba(255,255,255,0.1); }
        .challenge-title { font-weight: 700; margin-bottom: 10px; font-size: 14px; }
        .challenge-progress { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; margin-top: 10px; }
        .challenge-bar { height: 100%; background: linear-gradient(90deg, #ff4b2b, #ff416c); width: 0%; transition: width 0.3s ease; }
        .notification-toast { position: fixed; top: 80px; right: 20px; background: rgba(0,0,0,0.9); color: white; padding: 15px 20px; border-radius: 12px; border-left: 4px solid var(--current-accent); animation: slideIn 0.3s ease; z-index: 2000; max-width: 300px; }
        @keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .sort-container { display: flex; gap: 10px; margin: 15px 0; padding: 0 15px; }
        .sort-btn { padding: 8px 16px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; color: white; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.2s; }
        .sort-btn.active { background: var(--current-accent); border-color: var(--current-accent); }
        .sort-btn:hover { background: rgba(255,255,255,0.15); }
        .reactions-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); }
        .reaction-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 8px 14px; cursor: pointer; font-size: 14px; transition: all 0.2s; color: white; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; }
        .reaction-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.1); }
        .reaction-btn:active { background: var(--current-accent); border-color: var(--current-accent); }
        .reaction-count { font-size: 12px; color: rgba(255,255,255,0.7); }
        /* TEMPORIZADOR */
        .timer-badge { background: linear-gradient(135deg, #ff4b2b, #ff416c); padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; color: white; display: inline-block; margin-bottom: 10px; }
        /* SKELETON LOADING */
        .skeleton { background: linear-gradient(90deg, rgba(255,255,255,0.1) 25%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0.1) 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: 8px; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .skeleton-text { height: 12px; margin-bottom: 8px; }
        .skeleton-avatar { width: 40px; height: 40px; border-radius: 50%; }
        .skeleton-image { height: 200px; margin: 10px 0; }
        /* SHAKE ANIMATION */
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .shake-animation { animation: shake 0.5s; }
    </style>
</head>
<body>
    <!-- CONTENEDOR DE PARTÍCULAS FLOTANTES -->
    <div class="particles-container" id="particles-container"></div>

    <header class="header" id="main-header">
        <h1>SnapBookSocial</h1>
        <div class="mood-bar-container">
            <div class="mood-bar">
                <div class="mood-item active" data-mood="all">
                    <span class="mood-emoji">🏠</span>
                    <span class="mood-label">Todo</span>
                </div>
                <div class="mood-item" data-mood="hot">
                    <span class="mood-emoji">🔥</span>
                    <span class="mood-label">Hot</span>
                </div>
                <div class="mood-item" data-mood="relax">
                    <span class="mood-emoji">🌊</span>
                    <span class="mood-label">Relax</span>
                </div>
                <div class="mood-item" data-mood="drama">
                    <span class="mood-emoji">🎭</span>
                    <span class="mood-label">Drama</span>
                </div>
                <div class="mood-item" data-mood="tech">
                    <span class="mood-emoji">💻</span>
                    <span class="mood-label">Tech</span>
                </div>
            </div>
        </div>
    </header>

    <!-- DESAFÍO SEMANAL -->
    <div class="weekly-challenge" id="weekly-challenge" style="margin: 15px;">
        <div class="challenge-title">⚡ Desafío Semanal</div>
        <div style="font-size: 12px; color: rgba(255,255,255,0.7); margin-bottom: 10px;" id="challenge-desc">Publica 5 posts en Hot</div>
        <div class="challenge-progress">
            <div class="challenge-bar" id="challenge-bar"></div>
        </div>
        <div style="font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 8px;" id="challenge-count">0/5 completado</div>
    </div>

    <!-- SELECTOR DE ORDEN -->
    <div class="sort-container">
        <button class="sort-btn active" onclick="setSortOrder('recent')">🕐 Recientes</button>
        <button class="sort-btn" onclick="setSortOrder('popular')">⭐ Populares</button>
        <button class="sort-btn" onclick="setSortOrder('oldest')">📅 Antiguos</button>
    </div>

    <main id="feed-container">
        <!-- Los posts se cargarán aquí -->
    </main>

    <nav class="nav-bar">
        <a href="home.html" class="nav-item active">
            <img src="https://img.icons8.com/m_rounded/512/FFFFFF/home.png" alt="Home">
            <span>INICIO</span>
        </a>

        <a href="createposts.html" class="btn-add">+</a>

        <a href="menu.html" class="nav-item">
            <img src="https://img.icons8.com/m_rounded/512/FFFFFF/menu.png" alt="Menu">
            <span>MENÚ</span>
        </a>
    </nav>

    <!-- Modal de Comentarios -->
    <div id="comments-modal" class="comments-modal">
        <div class="comments-content">
            <div class="comments-header">
                <h3>Comentarios</h3>
                <button onclick="closeComments()" style="background:none; border:none; font-size:20px; cursor:pointer;">✕</button>
            </div>
            <div id="comments-list" class="comments-list"></div>
            <!-- INDICADOR DE ESCRITURA -->
            <div id="typing-indicator" class="typing-indicator">
                <span id="typing-text">Alguien está escribiendo</span>
                <div class="typing-dots">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            </div>
            <div class="comment-input-area">
                <input type="text" id="comment-input" placeholder="Escribe un comentario...">
                <button class="comment-send-btn" id="send-comment-btn">➤</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, set, runTransaction, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDN89D9cljm0e8OzrPtloYOUcOY7XSXBqg",
            authDomain: "socialtest-3d114.firebaseapp.com",
            databaseURL: "https://socialtest-3d114-default-rtdb.firebaseio.com",
            projectId: "socialtest-3d114",
            storageBucket: "socialtest-3d114.firebasestorage.app",
            messagingSenderId: "779140232754",
            appId: "1:779140232754:android:8b1d492ce1970d98e26e2b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const container = document.getElementById('feed-container');

        let currentUser = null;
        let currentUserProfile = null;
        let activePostId = null;
        let currentMood = 'all';
        let lastPostsData = {};

        onAuthStateChanged(auth, async (user) => {
            console.log("Estado de autenticación cambiado:", user ? "Conectado" : "Desconectado");
            if (user) {
                currentUser = user;
                currentUserProfile = null;
                try {
                    const profileSnap = await get(ref(db, `Users/${user.uid}`));
                    currentUserProfile = profileSnap.exists() ? profileSnap.val() : null;
                } catch (error) {
                    console.warn('No se pudo cargar el perfil del usuario para los retos semanales', error);
                }
                loadPosts();
            } else {
                window.location.href = "login.html";
            }
        });

        // LÓGICA DE MOOD FEED
        const moodItems = document.querySelectorAll('.mood-item');
        const body = document.body;
        const header = document.getElementById('main-header');

        moodItems.forEach(item => {
            item.addEventListener('click', () => {
                const mood = item.getAttribute('data-mood');
                moodItems.forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                body.className = mood === 'all' ? '' : `mood-active mood-${mood}`;
                currentMood = mood;
                loadPosts();
            });
        });

        window.addEventListener('scroll', () => {
            if (window.scrollY > 20) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });

        const formatTime = (timestamp) => {
            if (!timestamp) return "";
            const date = new Date(timestamp);
            return date.toLocaleDateString('es-ES', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
        };

        window.toggleLike = async (postId) => {
            if (!currentUser) return;
            const likeRef = ref(db, `ListPosts/${postId}/likes/${currentUser.uid}`);
            const snapshot = await get(likeRef);
            if (snapshot.exists()) {
                await set(likeRef, null);
            } else {
                await set(likeRef, true);
            }
        };

        window.openComments = (postId) => {
            activePostId = postId;
            document.getElementById('comments-modal').classList.add('open');
            loadComments(postId);
            listenTyping(postId);
        };

        window.closeComments = () => {
            if (activePostId && currentUser) {
                set(ref(db, `ListPosts/${activePostId}/typing/${currentUser.uid}`), null);
            }
            document.getElementById('comments-modal').classList.remove('open');
            activePostId = null;
        };

        const typingIndicator = document.getElementById('typing-indicator');
        const commentInput = document.getElementById('comment-input');

        commentInput.oninput = () => {
            if (activePostId && currentUser) {
                const isTyping = commentInput.value.trim().length > 0;
                set(ref(db, `ListPosts/${activePostId}/typing/${currentUser.uid}`), isTyping ? true : null);
            }
        };

        const listenTyping = (postId) => {
            const typingRef = ref(db, `ListPosts/${postId}/typing`);
            onValue(typingRef, (snap) => {
                if (snap.exists()) {
                    const typers = snap.val();
                    const othersTyping = Object.keys(typers).filter(uid => uid !== currentUser?.uid);
                    if (othersTyping.length > 0) {
                        typingIndicator.classList.add('active');
                    } else {
                        typingIndicator.classList.remove('active');
                    }
                } else {
                    typingIndicator.classList.remove('active');
                }
            });
        };

        const loadComments = (postId) => {
            const commentsRef = ref(db, `ListPosts/${postId}/comments`);
            const list = document.getElementById('comments-list');
            onValue(commentsRef, (snap) => {
                list.innerHTML = "";
                if (snap.exists()) {
                    Object.values(snap.val()).forEach(c => {
                        const div = document.createElement('div');
                        div.className = 'comment-item';
                        div.innerHTML = `
                            <div class="comment-avatar">
                                <img src="${c.perfil || 'https://www.w3schools.com/howto/img_avatar.png'}" onerror="this.src='https://www.w3schools.com/howto/img_avatar.png'">
                            </div>
                            <div class="comment-bubble"><strong>${c.nick || 'Usuario'}</strong>${c.text}</div>
                        `;
                        list.appendChild(div);
                    });
                    list.scrollTop = list.scrollHeight;
                } else {
                    list.innerHTML = "<p style='text-align:center; color:#888;'>No hay comentarios aún.</p>";
                }
            });
        };

        document.getElementById('send-comment-btn').onclick = async () => {
            const input = document.getElementById('comment-input');
            const text = input.value.trim();
            if (!text || !activePostId || !currentUser) return;

            const userRef = ref(db, `Users/${currentUser.uid}`);
            const userSnap = await get(userRef);
            const userData = userSnap.exists() ? userSnap.val() : { nick: "Usuario" };

            const newCommentRef = push(ref(db, `ListPosts/${activePostId}/comments`));
            await set(newCommentRef, {
                uid: currentUser.uid,
                nick: userData.nick || "Usuario",
                perfil: userData.perfil || "https://www.w3schools.com/howto/img_avatar.png",
                text: text,
                time: Date.now()
            });

            const postRef = ref(db, `ListPosts/${activePostId}`);
            runTransaction(postRef, (post) => {
                if (post) post.commentCount = (post.commentCount || 0) + 1;
                return post;
            });
            input.value = "";
        };

        window.votePoll = async (postId, optionKey) => {
            if (!currentUser) return;
            const pollRef = ref(db, `ListPosts/${postId}/poll`);
            const voteRef = ref(db, `ListPosts/${postId}/poll/userVotes/${currentUser.uid}`);
            const voteSnap = await get(voteRef);
            if (voteSnap.exists()) return;

            await runTransaction(pollRef, (poll) => {
                if (poll) {
                    if (!poll.userVotes) poll.userVotes = {};
                    poll.userVotes[currentUser.uid] = optionKey;
                    if (poll.options && poll.options[optionKey]) {
                        poll.options[optionKey].votes = (poll.options[optionKey].votes || 0) + 1;
                        poll.totalVotes = (poll.totalVotes || 0) + 1;
                    }
                }
                return poll;
            });
        };

        let postsUnsubscribe = null;
        const loadPosts = () => {
            console.log("Iniciando carga de posts...");
            // Desuscribir del listener anterior si existe
            if (postsUnsubscribe) {
                postsUnsubscribe();
            }
            const postsRef = ref(db, "ListPosts");
            postsUnsubscribe = onValue(postsRef, (snapshot) => {
                container.innerHTML = "";
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    lastPostsData = data || {};
                    let postIds = Object.keys(data);
                    
                    // Ordenar posts según el criterio seleccionado
                    if (currentSortOrder === 'popular') {
                        postIds.sort((a, b) => Object.keys(data[b].likes || {}).length - Object.keys(data[a].likes || {}).length);
                    } else if (currentSortOrder === 'oldest') {
                        postIds.sort((a, b) => (data[a].time || 0) - (data[b].time || 0));
                    } else {
                        postIds.reverse(); // recientes primero
                    }
                    
                    let hasVisiblePosts = false;

                    postIds.forEach(postId => {
                        const post = data[postId];
                        const postMood = (post.mood || "").toLowerCase();
                        const matchesMood = currentMood === 'all' || postMood === currentMood;
                        if (!matchesMood) return;
                        hasVisiblePosts = true;

                        const card = document.createElement('div');
                        card.className = 'post-card';
                        const likeCount = post.likes ? Object.keys(post.likes).length : 0;
                        const commentCount = post.commentCount || 0;
                        const userLiked = currentUser && post.likes && post.likes[currentUser.uid];
                        const userCommented = currentUser && post.comments && Object.values(post.comments).some(c => c.uid === currentUser.uid);

                        let html = `
                            <div class="post-header">
                                <div class="post-avatar"><img src="${post.perfil || 'https://www.w3schools.com/howto/img_avatar.png'}"></div>
                                <div class="post-meta">
                                    <div class="post-nick-container">
                                        <span class="post-nick">${post.nick || 'Usuario'}</span>
                                        <span class="platform-tag ${(post.multi || 'web').toLowerCase()}"></span>
                                    </div>
                                    <span class="post-time">${formatTime(post.time)}</span>
                                </div>
                            </div>
                            <div class="post-body">${post.text || ''}</div>
                        `;

                        if (post.poll && post.poll.options) {
                            const poll = post.poll;
                            const total = poll.totalVotes || 0;
                            html += `<div class="poll-container">`;
                            Object.keys(poll.options).forEach(optKey => {
                                const opt = poll.options[optKey];
                                const votes = opt.votes || 0;
                                const percent = total > 0 ? Math.round((votes / total) * 100) : 0;
                                html += `
                                    <div class="poll-option" onclick="votePoll('${postId}', '${optKey}')">
                                        <div class="poll-bar" style="width: ${percent}%"></div>
                                        <span class="poll-text">${opt.text}</span>
                                        <span class="poll-percent">${percent}% (${votes})</span>
                                    </div>
                                `;
                            });
                            html += `</div>`;
                        }

                        if (post.image) {
                            html += `<img src="${post.image}" class="post-published-image">`;
                        }

                        // Reacciones
                        const postReactions = JSON.parse(localStorage.getItem('postReactions')) || {};
                        const postReactionCounts = postReactions[postId] || {};
                        let reactionsHtml = '';
                        ['\ud83d\ude02', '\ud83d\ude0d', '\ud83d\ude22', '\ud83d\ude21', '\ud83d\udd25'].forEach(emoji => {
                            reactionsHtml += '<button class="reaction-btn" onclick="addReaction(\'' + postId + '\', \'' + emoji + '\')">' + emoji + ' <span class="reaction-count">' + (postReactionCounts[emoji] || 0) + '</span></button>';
                        });

                        // Temporizador
                        let timerHtml = '';
                        if (post.countdown && post.countdown.expiresAt) {
                            const timeLeft = post.countdown.expiresAt - Date.now();
                            if (timeLeft > 0) {
                                const hours = Math.floor(timeLeft / (1000 * 60 * 60));
                                const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
                                timerHtml = '<div class="timer-badge" data-timer="' + post.countdown.expiresAt + '">\u23f0 Expira en ' + hours + 'h ' + minutes + 'm</div>';
                            }
                        }

                        html += timerHtml;
                        html += '<div class="post-footer">';
                        html += '<button class="action-btn ' + (userLiked ? 'liked' : '') + '" onclick="toggleLike(\'' + postId + '\')"><img src="' + (userLiked ? 'https://img.icons8.com/ios-filled/50/FF0000/like.png' : 'https://img.icons8.com/ios/50/65676b/like.png') + '"><span>' + likeCount + '</span></button>';
                        html += '<button class="action-btn ' + (userCommented ? 'commented' : '') + '" onclick="openComments(\'' + postId + '\')"><img src="' + (userCommented ? 'https://img.icons8.com/ios-filled/50/007AFF/comments.png' : 'https://img.icons8.com/ios/50/65676b/comments.png') + '"><span>' + commentCount + '</span></button>';
                        html += '</div>';
                        html += '<div class="reactions-container">' + reactionsHtml + '</div>';
                        card.innerHTML = html;
                        card.setAttribute('data-mood', postMood);
                        card.setAttribute('data-time', post.time || 0);
                        card.setAttribute('data-likes', likeCount);
                        card.setAttribute('data-post-id', postId);
                        container.appendChild(card);
                    });

                    if (!hasVisiblePosts) {
                        container.innerHTML = `<p style='text-align:center; color:#888; margin-top: 50px;'>No hay publicaciones con el mood "${currentMood}" aún.</p>`;
                    }
                } else {
                    lastPostsData = {};
                    container.innerHTML = "<p style='text-align:center; color:#888;'>No hay publicaciones a\u00fan.</p>";
                }
                // Actualizar desaf\u00edo semanal
                if (typeof updateWeeklyChallenge === 'function') {
                    try { updateWeeklyChallenge(lastPostsData); } catch(e) {}
                }
            });
        };

        // ===== PARTÍCULAS FLOTANTES =====
        const particlesConfig = {
            hot: { emoji: '🔥', color: '#ff4b2b', count: 15 },
            relax: { emoji: '🌊', color: '#2193b0', count: 12 },
            drama: { emoji: '🎭', color: '#8e2de2', count: 10 },
            tech: { emoji: '💻', color: '#00f2fe', count: 14 }
        };

        let currentParticles = [];

        const createParticle = (mood) => {
            const config = particlesConfig[mood] || particlesConfig.hot;
            const container = document.getElementById('particles-container');
            
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.textContent = config.emoji;
            particle.style.fontSize = Math.random() * 20 + 15 + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.opacity = Math.random() * 0.5 + 0.3;
            
            const duration = Math.random() * 8 + 6;
            const tx = (Math.random() - 0.5) * 200;
            particle.style.setProperty('--tx', tx + 'px');
            particle.style.animation = `float-up ${duration}s linear infinite`;
            
            container.appendChild(particle);
            currentParticles.push(particle);
            
            setTimeout(() => {
                particle.remove();
                currentParticles = currentParticles.filter(p => p !== particle);
            }, duration * 1000);
        };

        const startParticles = (mood) => {
            // Limpiar partículas anteriores
            currentParticles.forEach(p => p.remove());
            currentParticles = [];
            
            const config = particlesConfig[mood];
            if (!config) return;
            
            // Crear partículas iniciales
            for (let i = 0; i < config.count; i++) {
                setTimeout(() => createParticle(mood), i * 200);
            }
            
            // Crear nuevas partículas cada 2 segundos
            const particleInterval = setInterval(() => {
                if (currentMood !== mood) {
                    clearInterval(particleInterval);
                    return;
                }
                createParticle(mood);
            }, 2000);
        };

        // Iniciar partículas cuando cambia el mood
        const originalMoodItems = document.querySelectorAll('.mood-item');
        originalMoodItems.forEach(item => {
            item.addEventListener('click', () => {
                setTimeout(() => {
                    const mood = item.getAttribute('data-mood');
                    if (mood !== 'all') {
                        startParticles(mood);
                    } else {
                        currentParticles.forEach(p => p.remove());
                        currentParticles = [];
                    }
                }, 100);
            });
        });

        // Iniciar con el primer mood
        startParticles('hot');

        // DESAFIO SEMANAL Y ORDENAMIENTO
        let currentSortOrder = 'recent';
        window.setSortOrder = (order) => {
            currentSortOrder = order;
            document.querySelectorAll('.sort-btn').forEach(btn => {
                const isActive = btn.getAttribute('onclick') === `setSortOrder('${order}')`;
                btn.classList.toggle('active', isActive);
            });
            loadPosts();
        };

        const WEEKLY_CHALLENGES = [
            {
                id: 'hot-posts',
                description: 'Publica 5 posts en Hot',
                target: 5,
                getProgress: (posts) => posts.filter(post => isOwnPost(post) && isThisWeek(post.time) && normalizeMood(post.mood) === 'hot').length
            },
            {
                id: 'relax-posts',
                description: 'Publica 3 posts en Relax',
                target: 3,
                getProgress: (posts) => posts.filter(post => isOwnPost(post) && isThisWeek(post.time) && normalizeMood(post.mood) === 'relax').length
            },
            {
                id: 'tech-posts',
                description: 'Publica 3 posts en Tech',
                target: 3,
                getProgress: (posts) => posts.filter(post => isOwnPost(post) && isThisWeek(post.time) && normalizeMood(post.mood) === 'tech').length
            },
            {
                id: 'comments',
                description: 'Escribe 8 comentarios esta semana',
                target: 8,
                getProgress: (posts) => posts.reduce((total, post) => {
                    const comments = Object.values(post.comments || {});
                    return total + comments.filter(comment => comment?.uid === currentUser?.uid && isThisWeek(comment?.time)).length;
                }, 0)
            },
            {
                id: 'polls',
                description: 'Crea 2 encuestas esta semana',
                target: 2,
                getProgress: (posts) => posts.filter(post => isOwnPost(post) && isThisWeek(post.time) && post.poll && post.poll.options).length
            }
        ];

        const getStartOfWeek = (date = new Date()) => {
            const d = new Date(date);
            const day = (d.getDay() + 6) % 7;
            d.setHours(0, 0, 0, 0);
            d.setDate(d.getDate() - day);
            return d;
        };

        const getWeekKey = () => getStartOfWeek().toISOString().slice(0, 10);
        const getWeekIndex = () => Math.floor(getStartOfWeek().getTime() / (7 * 24 * 60 * 60 * 1000));
        const normalizeMood = (mood) => String(mood || '').trim().toLowerCase();
        const isThisWeek = (timestamp) => {
            if (!timestamp) return false;
            const start = getStartOfWeek();
            const end = new Date(start);
            end.setDate(end.getDate() + 7);
            const time = Number(timestamp);
            return !Number.isNaN(time) && time >= start.getTime() && time < end.getTime();
        };
        const isOwnPost = (post) => {
            if (!currentUser || !post) return false;
            const possibleOwnerIds = [post.uid, post.userId, post.authorId, post.ownerId, post.createdBy].filter(Boolean);
            if (possibleOwnerIds.includes(currentUser.uid)) return true;

            const profileNick = String(currentUserProfile?.nick || '').trim().toLowerCase();
            const postNick = String(post.nick || post.username || '').trim().toLowerCase();
            return profileNick && postNick && profileNick === postNick;
        };
        const getActiveWeeklyChallenge = () => {
            const index = ((getWeekIndex() % WEEKLY_CHALLENGES.length) + WEEKLY_CHALLENGES.length) % WEEKLY_CHALLENGES.length;
            return WEEKLY_CHALLENGES[index];
        };

        const updateWeeklyChallenge = (postsData = lastPostsData) => {
            const descEl = document.getElementById('challenge-desc');
            const barEl = document.getElementById('challenge-bar');
            const countEl = document.getElementById('challenge-count');
            if (!descEl || !barEl || !countEl) return;

            const challenge = getActiveWeeklyChallenge();
            const posts = Object.values(postsData || {});
            const rawProgress = currentUser ? challenge.getProgress(posts) : 0;
            const progress = Math.max(0, rawProgress);
            const percent = Math.min((progress / challenge.target) * 100, 100);
            const completed = progress >= challenge.target;

            descEl.textContent = challenge.description;
            barEl.style.width = percent + '%';
            barEl.style.background = completed
                ? 'linear-gradient(90deg, #00c853, #b2ff59)'
                : 'linear-gradient(90deg, #ff4b2b, #ff416c)';
            countEl.textContent = completed
                ? `✅ Completado (${Math.min(progress, challenge.target)}/${challenge.target})`
                : `${progress}/${challenge.target} completado`;

            const completionKey = `weeklyChallengeCompleted:${getWeekKey()}:${challenge.id}`;
            if (completed && !localStorage.getItem(completionKey)) {
                localStorage.setItem(completionKey, 'true');
                if (typeof showNotification === 'function') {
                    showNotification('¡Has completado el desafío semanal!');
                }
            }
        };

        // NOTIFICACIONES PUSH
        window.showNotification = (message) => {
            const toast = document.createElement('div');
            toast.className = 'notification-toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        };

        // REACCIONES (toggle: 1 al presionar, 0 al volver a presionar)
        const reactionEmojis = ['😂', '😍', '😢', '😡', '🔥'];
        window.addReaction = (postId, emoji) => {
            const reactions = JSON.parse(localStorage.getItem('postReactions')) || {};
            if (!reactions[postId]) reactions[postId] = {};
            
            // Toggle: si ya tiene 1, poner 0. Si tiene 0, poner 1.
            if (reactions[postId][emoji] && reactions[postId][emoji] > 0) {
                reactions[postId][emoji] = 0;
            } else {
                reactions[postId][emoji] = 1;
            }
            localStorage.setItem('postReactions', JSON.stringify(reactions));
            
            // Actualizar solo el contador y estilo sin recargar
            const buttons = document.querySelectorAll('[data-post-id="' + postId + '"] .reaction-btn');
            buttons.forEach(btn => {
                if (btn.textContent.includes(emoji)) {
                    const countSpan = btn.querySelector('.reaction-count');
                    if (countSpan) {
                        countSpan.textContent = reactions[postId][emoji];
                    }
                    if (reactions[postId][emoji] > 0) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                }
            });
            
            if (reactions[postId][emoji] > 0) {
                showNotification('Reaccion anadida!');
            } else {
                showNotification('Reaccion eliminada');
            }
        };

        // loadFeed eliminado - se usa loadPosts directamente

        // ===== SKELETON LOADING =====
        const showSkeletonLoading = () => {
            const container = document.getElementById('feed-container');
            container.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const skeleton = document.createElement('div');
                skeleton.className = 'post-card';
                skeleton.innerHTML = `
                    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                        <div class="skeleton skeleton-avatar"></div>
                        <div style="flex: 1;">
                            <div class="skeleton skeleton-text" style="width: 60%;"></div>
                            <div class="skeleton skeleton-text" style="width: 40%;"></div>
                        </div>
                    </div>
                    <div class="skeleton skeleton-image"></div>
                    <div class="skeleton skeleton-text" style="width: 100%;"></div>
                    <div class="skeleton skeleton-text" style="width: 80%;"></div>
                `;
                container.appendChild(skeleton);
            }
        };

        // ===== TEMPORIZADOR EN POSTS =====
        const updateTimers = () => {
            const postCards = document.querySelectorAll('.post-card');
            postCards.forEach(card => {
                const timerElement = card.querySelector('[data-timer]');
                if (timerElement) {
                    const expiresAt = parseInt(timerElement.getAttribute('data-timer'));
                    const now = Date.now();
                    const timeLeft = expiresAt - now;
                    
                    if (timeLeft <= 0) {
                        timerElement.style.display = 'none';
                    } else {
                        const hours = Math.floor(timeLeft / (1000 * 60 * 60));
                        const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
                        timerElement.textContent = '⏰ Expira en ' + hours + 'h ' + minutes + 'm';
                    }
                }
            });
        };
        setInterval(updateTimers, 60000);

        // ===== SHAKE PARA SORPRESA =====
        let lastShakeTime = 0;
        window.addEventListener('devicemotion', (event) => {
            const acceleration = event.accelerationIncludingGravity;
            const x = acceleration.x || 0;
            const y = acceleration.y || 0;
            const z = acceleration.z || 0;
            
            const shakeStrength = Math.sqrt(x * x + y * y + z * z);
            
            if (shakeStrength > 30) {
                const now = Date.now();
                if (now - lastShakeTime > 1000) {
                    lastShakeTime = now;
                    showRandomPost();
                }
            }
        });

        window.showRandomPost = () => {
            const container = document.getElementById('feed-container');
            const posts = container.querySelectorAll('.post-card');
            
            if (posts.length === 0) {
                showNotification('No hay posts para mostrar');
                return;
            }
            
            posts.forEach(post => post.classList.remove('shake-animation'));
            
            const randomPost = posts[Math.floor(Math.random() * posts.length)];
            randomPost.classList.add('shake-animation');
            randomPost.scrollIntoView({ behavior: 'smooth', block: 'center' });
            showNotification('Sorpresa encontrada!');
            
            setTimeout(() => randomPost.classList.remove('shake-animation'), 500);
        };

        // Mostrar boton de shake en pantalla
        const shakeBtn = document.createElement('button');
        shakeBtn.textContent = '🎲 Sorpresa';
        shakeBtn.style.cssText = 'position: fixed; bottom: 120px; right: 20px; padding: 12px 16px; background: linear-gradient(135deg, #ff4b2b, #ff416c); border: none; border-radius: 20px; color: white; font-weight: 700; cursor: pointer; z-index: 999; box-shadow: 0 4px 12px rgba(255,75,43,0.4);';
        shakeBtn.onclick = () => showRandomPost();
        document.body.appendChild(shakeBtn);
    </script>
