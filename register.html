<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - SnapBook</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: #1c1c1e; width: 85%; max-width: 380px; padding: 40px; border-radius: 40px; text-align: center; }
        h1 { font-size: 42px; margin-bottom: 30px; font-weight: 800; }
        input { width: 100%; background: #2c2c2e; border: 1px solid #3a3a3c; padding: 18px; border-radius: 20px; color: white; margin-bottom: 15px; box-sizing: border-box; font-size: 16px; outline: none; }
        .btn-reg { width: 100%; background: #007AFF; color: white; border: none; padding: 18px; border-radius: 25px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 10px; }
        .footer-link { margin-top: 25px; color: #8e8e93; font-size: 14px; }
        .footer-link a { color: #007AFF; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h1>SnapBook</h1>
        
        <input type="email" id="email" placeholder="Correo electrónico">
        <input type="password" id="pass" placeholder="Contraseña">
        
        <button class="btn-reg" id="register-btn">Registrarse</button>

        <div class="footer-link">
            ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js?v=1';
        import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const registerBtn = document.getElementById('register-btn');

        registerBtn.onclick = async () => {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('pass').value;

            if (!email || !pass) return alert("Completa todos los campos");

            registerBtn.disabled = true;
            registerBtn.innerText = "Registrando...";

            try {
                // 1. Crear usuario en Firebase Auth
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                // 2. Crear el nodo inicial en "Users" con los campos exactos
                await set(ref(db, `Users/${user.uid}`), {
                    correo: email,         //
                    nick: "Nuevo Usuario", // Se cambiará después en perfil.html
                    password: pass,        //
                    perfil: "",            //
                    type: "unlocked"       //
                });

                // Ir a configurar el perfil (donde pondrá su Nick y Foto)
                window.location.href = "perfil.html";

            } catch (e) {
                alert("Error: " + e.message);
                registerBtn.disabled = false;
                registerBtn.innerText = "Registrarse";
            }
        };
    </script>
</body>
</html>
