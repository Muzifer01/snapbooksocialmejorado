<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapBookSocial - Inicio</title>
    <style>
        :root {
            --bg-black: #000000;
            --card-white: #ffffff;
            --text-main: #1c1e21;
            --text-muted: #65676b;
            --accent: #007AFF;
            --poll-bg: #f0f2f5;
            --poll-bar: rgba(0, 122, 255, 0.2);
            
            /* Mood Colors */
            --mood-hot: linear-gradient(135deg, #ff4b2b 0%, #ff416c 100%);
            --mood-relax: linear-gradient(135deg, #2193b0 0%, #6dd5ed 100%);
            --mood-drama: linear-gradient(135deg, #8e2de2 0%, #4a00e0 100%);
            --mood-tech: linear-gradient(135deg, #000428 0%, #004e92 100%);
            --mood-default: #000000;
            
            /* Mood Accent Colors */
            --accent-hot: #ff4b2b;
            --accent-relax: #2193b0;
            --accent-drama: #8e2de2;
            --accent-tech: #00f2fe;
            --current-accent: var(--accent);
        }

        /* MOOD BACKGROUNDS */
        body.mood-hot { background: var(--mood-hot); --current-accent: var(--accent-hot); }
        body.mood-relax { background: var(--mood-relax); --current-accent: var(--accent-relax); }
        body.mood-drama { background: var(--mood-drama); --current-accent: var(--accent-drama); }
        body.mood-tech { background: var(--mood-tech); --current-accent: var(--accent-tech); }

        /* PARTÍCULAS FLOTANTES */
        .particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            pointer-events: none;
        }

        @keyframes float-up {
            0% {
                opacity: 1;
                transform: translateY(0) translateX(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-100vh) translateX(var(--tx)) scale(0.5);
            }
        }

        @keyframes float-down {
            0% {
                opacity: 0;
                transform: translateY(-10px) scale(0);
            }
            50% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateY(100vh) scale(1);
            }
        }

        body {
            margin: 0;
            background-color: var(--bg-black);
            font-family: -apple-system, system-ui, sans-serif;
            color: white;
            transition: background 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        body.mood-active {
            background-attachment: fixed;
        }

        /* FONDO DINÁMICO CON AURA */
        body::before {
            content: "";
            position: fixed;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 50%);
            animation: auraRotate 25s linear infinite;
            pointer-events: none;
            z-index: -1;
        }
        
        @keyframes auraRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* HEADER */
        .header {
            padding: 20px 20px 10px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            position: sticky; 
            top: 0; 
            z-index: 100;
            transition: all 0.5s ease;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .header.scrolled {
            background: rgba(0,0,0,0.4);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .header h1 { 
            font-size: 24px; 
            margin: 0; 
            font-weight: 800; 
            letter-spacing: -1px;
        }

        /* MOOD BAR PREMIUM GLASSMORPHISM RESTORED */
        .mood-bar-container {
            margin-top: 15px;
            overflow-x: auto;
            padding: 5px 0 15px;
            scrollbar-width: none;
        }
        .mood-bar-container::-webkit-scrollbar { display: none; }
        
        .mood-bar {
            display: flex;
            gap: 12px;
            padding: 2px 10px;
        }
        
        .mood-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px) saturate(150%);
            -webkit-backdrop-filter: blur(15px) saturate(150%);
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            padding: 6px 16px;
            border-radius: 50px; /* Forma de cápsula perfecta */
            color: white;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: 800;
            font-size: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        /* Colores por Mood */
        .mood-item[data-mood="hot"] { border-color: rgba(255, 75, 43, 0.4); }
        .mood-item[data-mood="relax"] { border-color: rgba(33, 147, 176, 0.4); }
        .mood-item[data-mood="drama"] { border-color: rgba(142, 45, 226, 0.4); }
        .mood-item[data-mood="tech"] { border-color: rgba(0, 242, 254, 0.4); }

        .mood-item:hover {
            transform: translateY(-3px) scale(1.05);
            background: rgba(255, 255, 255, 0.15);
        }
        
        .mood-item.active {
            transform: scale(1.1) translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-color: white;
        }

        /* Colores Activos con Resplandor */
        .mood-item.active[data-mood="all"] { background: white; color: black; box-shadow: 0 0 20px rgba(255,255,255,0.4); }
        .mood-item.active[data-mood="hot"] { background: #ff4b2b; color: white; box-shadow: 0 0 20px rgba(255, 75, 43, 0.6); }
        .mood-item.active[data-mood="relax"] { background: #2193b0; color: white; box-shadow: 0 0 20px rgba(33, 147, 176, 0.6); }
        .mood-item.active[data-mood="drama"] { background: #8e2de2; color: white; box-shadow: 0 0 20px rgba(142, 45, 226, 0.6); }
        .mood-item.active[data-mood="tech"] { background: #00f2fe; color: black; box-shadow: 0 0 20px rgba(0, 242, 254, 0.6); }
        
        .mood-emoji {
            font-size: 16px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }
        
        .mood-label {
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1.5px;
            font-weight: 900;
        }



        /* CONTENEDOR DE POSTS */
        #feed-container {
            padding: 20px 15px 120px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* ESTILOS DE LA TARJETA GLASSMORPHISM ULTRA */
        .post-card {
            margin-bottom: 0;
            background: rgba(255, 255, 255, 0.12); /* Mucho más transparente */
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border-radius: 28px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            color: white; /* Texto blanco para resaltar sobre el cristal */
            animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
        }
        
        .post-card:hover {
            transform: translateY(-5px) scale(1.01);
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 15px 50px rgba(0,0,0,0.4);
        }

        /* GLOW DINÁMICO SEGÚN MOOD */
        body.mood-hot .post-card { border-left: 4px solid #ff4b2b; box-shadow: 0 10px 40px rgba(255, 75, 43, 0.2); }
        body.mood-relax .post-card { border-left: 4px solid #2193b0; box-shadow: 0 10px 40px rgba(33, 147, 176, 0.2); }
        body.mood-drama .post-card { border-left: 4px solid #8e2de2; box-shadow: 0 10px 40px rgba(142, 45, 226, 0.2); }
        body.mood-tech .post-card { border-left: 4px solid #00f2fe; box-shadow: 0 10px 40px rgba(0, 242, 254, 0.2); }

        /* Ajuste de textos internos para el cristal */
        .post-body { color: rgba(255, 255, 255, 0.95); font-weight: 500; }
        .post-time { color: rgba(255, 255, 255, 0.6); }

        /* NICKS CON CONTRASTE MÁXIMO */
        .post-nick { 
            font-weight: 900; 
            font-size: 17px;
            color: white !important;
            -webkit-text-fill-color: white !important;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            letter-spacing: 0.3px;
        }
        
        body.mood-active .post-nick {
            color: white !important;
            -webkit-text-fill-color: white !important;
            text-shadow: 0 0 15px var(--current-accent), 0 2px 10px rgba(0,0,0,0.8);
        }

        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .post-avatar { 
            width: 45px; height: 45px; background: #f0f2f5; 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; font-weight: bold; color: var(--accent); 
            overflow: hidden; 
        }
        .post-avatar img { width: 100%; height: 100%; object-fit: cover; user-select: none; -webkit-user-drag: none; }
        .post-meta { display: flex; flex-direction: column; }
        .post-nick-container { display: flex; align-items: center; gap: 8px; }
        .platform-tag {
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.7;
        }
        .platform-tag.android::before { content: "🤖"; }
        .platform-tag.iphone::before { content: "🍎"; }
        .platform-tag.pc::before { content: "💻"; }
        .platform-tag.mac::before { content: "🖥️"; }
        .platform-tag.web::before { content: "🌐"; }
        .platform-tag span { display: none; }
        .post-time { font-size: 11px; color: var(--text-muted); }
        .post-body { font-size: 15px; line-height: 1.4; margin-bottom: 12px; word-wrap: break-word; }
        .post-published-image { 
            width: 100%; 
            border-radius: 16px; 
            margin-bottom: 12px; 
            max-height: 400px; 
            object-fit: cover; 
            user-select: none; 
            -webkit-user-drag: none; 
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .post-published-video {
            width: 100%;
            border-radius: 18px;
            margin-bottom: 12px;
            max-height: 520px;
            object-fit: cover;
            background: rgba(0,0,0,0.45);
            border: 1px solid rgba(255,255,255,0.18);
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        .shorts-section {
            margin: 12px 15px 0;
            padding: 16px;
            border-radius: 26px;
            background: rgba(255,255,255,0.10);
            backdrop-filter: blur(22px) saturate(180%);
            -webkit-backdrop-filter: blur(22px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.16);
            box-shadow: 0 10px 35px rgba(0,0,0,0.25);
        }
        .shorts-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }
        .shorts-header h2 {
            margin: 0;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.4px;
        }
        .shorts-subtitle {
            margin: 2px 0 0;
            font-size: 12px;
            color: rgba(255,255,255,0.72);
        }
        .shorts-count {
            min-width: 34px;
            height: 34px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.14);
            border: 1px solid rgba(255,255,255,0.18);
            font-size: 13px;
            font-weight: 800;
            color: white;
        }
        .shorts-container {
            display: grid;
            grid-auto-flow: column;
            grid-auto-columns: minmax(220px, 72vw);
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 4px;
            scroll-snap-type: x proximity;
        }
        .shorts-container::-webkit-scrollbar { display: none; }
        .short-card {
            position: relative;
            min-height: 420px;
            border-radius: 24px;
            overflow: hidden;
            background: rgba(0,0,0,0.45);
            border: 1px solid rgba(255,255,255,0.14);
            box-shadow: 0 12px 32px rgba(0,0,0,0.35);
            scroll-snap-align: start;
            scroll-snap-stop: normal;
        }
        .short-video {
            width: 100%;
            height: 100%;
            min-height: 420px;
            object-fit: cover;
            background: #000;
        }
        .short-gradient {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.08) 0%, rgba(0,0,0,0.18) 38%, rgba(0,0,0,0.82) 100%);
            pointer-events: none;
        }
        .short-content {
            position: absolute;
            inset: auto 0 0 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 2;
        }
        .short-user {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .short-user img {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.45);
        }
        .short-user-meta strong {
            display: block;
            font-size: 14px;
        }
        .short-user-meta span {
            display: block;
            font-size: 11px;
            color: rgba(255,255,255,0.72);
        }
        .short-caption {
            font-size: 14px;
            line-height: 1.35;
            color: rgba(255,255,255,0.95);
            text-shadow: 0 1px 8px rgba(0,0,0,0.35);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .short-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .short-action-btn {
            border: 1px solid rgba(255,255,255,0.18);
            background: rgba(255,255,255,0.12);
            color: white;
            border-radius: 999px;
            padding: 8px 12px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            backdrop-filter: blur(8px);
        }
        .short-action-btn.liked { background: rgba(255, 59, 92, 0.25); border-color: rgba(255, 59, 92, 0.55); }
        .short-profile-note {
            font-size: 11px;
            color: rgba(255,255,255,0.68);
        }

        .short-card {
            cursor: pointer;
        }
        .short-open-hint {
            position: absolute;
            top: 14px;
            right: 14px;
            z-index: 3;
            padding: 7px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 800;
            color: white;
            background: rgba(0,0,0,0.38);
            border: 1px solid rgba(255,255,255,0.18);
            backdrop-filter: blur(10px);
        }
        .short-viewer-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 2600;
            background: rgba(0,0,0,0.82);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            align-items: center;
            justify-content: center;
            padding: 20px 14px;
        }
        .short-viewer-modal.open {
            display: flex;
        }
        body.viewer-open {
            overflow: hidden;
        }
        .short-viewer-shell {
            width: min(100%, 980px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }
        .short-viewer-stage {
            position: relative;
            width: min(100%, 420px);
            height: min(86vh, 780px);
            border-radius: 32px;
            overflow: hidden;
            background: #000;
            border: 1px solid rgba(255,255,255,0.16);
            box-shadow: 0 25px 70px rgba(0,0,0,0.55);
            display: flex;
            align-items: stretch;
            justify-content: center;
        }
        .short-viewer-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }
        .short-viewer-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0.08) 35%, rgba(0,0,0,0.78) 100%);
            pointer-events: none;
        }
        .short-viewer-top {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px;
        }
        .short-viewer-count,
        .short-viewer-close {
            border: 1px solid rgba(255,255,255,0.18);
            background: rgba(255,255,255,0.12);
            color: white;
            border-radius: 999px;
            font-weight: 800;
            backdrop-filter: blur(10px);
        }
        .short-viewer-count {
            padding: 8px 14px;
            font-size: 12px;
        }
        .short-viewer-close {
            width: 42px;
            height: 42px;
            font-size: 20px;
            cursor: pointer;
        }
        .short-viewer-body {
            position: absolute;
            inset: auto 0 0 0;
            z-index: 2;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 14px;
            padding: 18px;
        }
        .short-viewer-meta {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .short-viewer-meta .short-caption {
            -webkit-line-clamp: initial;
            overflow: visible;
        }
        .short-viewer-side-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: stretch;
        }
        .short-viewer-side-actions .short-action-btn {
            min-width: 86px;
            justify-content: center;
        }
        .short-viewer-nav {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.18);
            background: rgba(255,255,255,0.12);
            color: white;
            font-size: 28px;
            font-weight: 800;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }
        .short-viewer-nav:disabled {
            opacity: 0.35;
            cursor: default;
        }
        .short-viewer-play-hint {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 74px;
            z-index: 2;
            padding: 8px 12px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            color: white;
            background: rgba(0,0,0,0.32);
            border: 1px solid rgba(255,255,255,0.14);
            backdrop-filter: blur(10px);
            white-space: nowrap;
        }
        @media (max-width: 760px) {
            .short-viewer-modal {
                padding: 0;
            }
            .short-viewer-shell {
                width: 100%;
                height: 100%;
                gap: 0;
            }
            .short-viewer-stage {
                width: 100%;
                height: 100%;
                border-radius: 0;
                max-width: none;
            }
            .short-viewer-nav {
                position: absolute;
                top: 50%;
                transform: translateY(-50%);
                z-index: 3;
            }
            .short-viewer-nav.prev { left: 12px; }
            .short-viewer-nav.next { right: 12px; }
            .short-viewer-body {
                gap: 10px;
                padding: 16px 14px 24px;
            }
            .short-viewer-side-actions .short-action-btn {
                min-width: 72px;
                padding: 8px 10px;
                font-size: 12px;
            }
        }

        /* ESTILOS DE ENCUESTA */
        .poll-container {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .poll-option {
            position: relative;
            background: rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 12px 15px;
            cursor: pointer;
            overflow: hidden;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 600;
            transition: 0.2s;
        }
        .poll-bar {
            position: absolute;
            top: 0; left: 0; bottom: 0;
            background: var(--poll-bar);
            z-index: 0;
            transition: width 0.6s ease;
        }
        .poll-text { position: relative; z-index: 1; }
        .poll-percent { position: relative; z-index: 1; font-size: 12px; color: var(--accent); }

        .post-footer {
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            padding: 12px 0 0 0;
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: flex-end;
        }

        .action-btn { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            color: var(--text-muted); 
            font-size: 14px; 
            font-weight: 700; 
            cursor: pointer;
            background: rgba(0, 0, 0, 0.03);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            padding: 8px 16px;
            transition: all 0.2s;
        }
        
        .action-btn:hover {
            background: rgba(0, 0, 0, 0.06);
            transform: scale(1.05);
        }
        .action-btn img { width: 20px; height: 20px; }
        .action-btn.liked { color: #FF0000; }
        .action-btn.commented { color: var(--accent); }

        /* MODAL DE COMENTARIOS */
        .comments-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            align-items: flex-end;
            justify-content: center;
        }
        .comments-modal.open { display: flex; }
        .comments-content {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 100%;
            max-width: 500px;
            border-radius: 25px 25px 0 0;
            padding: 25px;
            max-height: 85vh;
            display: flex;

        /* Botones laterales (derecha) estilo TikTok */
        .video-side-btns {

        /* Indicador play/pause */
        .video-play-indicator {

                    currentUserProfile = profileSnap.exists() ? profileSnap.val() : null;
                } catch (error) {
                    console.warn('No se pudo cargar el perfil del usuario para los retos semanales', error);
                }
                loadPosts();
            } else {
                window.location.href = "login.html";
            }
        });

        // LÓGICA DE MOOD FEED
        const moodItems = document.querySelectorAll('.mood-item');
        const body = document.body;
        const header = document.getElementById('main-header');

        moodItems.forEach(item => {
            item.addEventListener('click', () => {
                const mood = item.getAttribute('data-mood');
                moodItems.forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                body.className = mood === 'all' ? '' : `mood-active mood-${mood}`;
                currentMood = mood;
                loadPosts();
            });
        });

        window.addEventListener('scroll', () => {
            if (window.scrollY > 20) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });

        const formatTime = (timestamp) => {
            if (!timestamp) return "";
            const date = new Date(timestamp);
            return date.toLocaleDateString('es-ES', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
        };

        const getPostExpiration = (post) => {
            if (!post || typeof post !== 'object') return null;
            const rawValue = post.countdown?.expiresAt ?? post.expiresAt ?? post.expirationTime ?? post.expireAt ?? null;
            const expiresAt = Number(rawValue);
            return Number.isFinite(expiresAt) && expiresAt > 0 ? expiresAt : null;
        };

        const isPostExpired = (post) => {
            const expiresAt = getPostExpiration(post);
            return expiresAt !== null && expiresAt <= Date.now();
        };

        const deleteExpiredPost = async (postId) => {
            if (!postId || deletingExpiredPosts.has(postId)) return;
            deletingExpiredPosts.add(postId);
            try {
                await remove(ref(db, `ListPosts/${postId}`));
            } catch (error) {
                console.warn('No se pudo eliminar la publicación expirada', postId, error);
            } finally {
                deletingExpiredPosts.delete(postId);
            }
        };

        window.toggleLike = async (postId) => {
            if (!currentUser) return;
            const likeRef = ref(db, `ListPosts/${postId}/likes/${currentUser.uid}`);
            const snapshot = await get(likeRef);
            if (snapshot.exists()) {
                await set(likeRef, null);
            } else {
                await set(likeRef, true);
            }
        };

        window.openComments = (postId) => {
            activePostId = postId;
            document.getElementById('comments-modal').classList.add('open');
            loadComments(postId);
            listenTyping(postId);
        };

        window.closeComments = () => {
            if (activePostId && currentUser) {
                set(ref(db, `ListPosts/${activePostId}/typing/${currentUser.uid}`), null);
            }
            document.getElementById('comments-modal').classList.remove('open');
            activePostId = null;
        };

        const typingIndicator = document.getElementById('typing-indicator');
        const commentInput = document.getElementById('comment-input');

        commentInput.oninput = () => {
            if (activePostId && currentUser) {
                const isTyping = commentInput.value.trim().length > 0;
                set(ref(db, `ListPosts/${activePostId}/typing/${currentUser.uid}`), isTyping ? true : null);
            }
        };

        const listenTyping = (postId) => {
            const typingRef = ref(db, `ListPosts/${postId}/typing`);
            onValue(typingRef, (snap) => {
                if (snap.exists()) {
                    const typers = snap.val();
                    const othersTyping = Object.keys(typers).filter(uid => uid !== currentUser?.uid);
                    if (othersTyping.length > 0) {
                        typingIndicator.classList.add('active');
                    } else {
                        typingIndicator.classList.remove('active');
                    }
                } else {
                    typingIndicator.classList.remove('active');
                }
            });
        };

        let currentShortVideos = [];
        let currentShortIndex = 0;
        let shortViewerTouchStartY = null;

        const getShortVideos = (postsMap = {}) => Object.entries(postsMap)
            .filter(([_, post]) => post && post.video)
            .filter(([_, post]) => !isPostExpired(post))
            .filter(([_, post]) => currentMood === 'all' || (post.mood || '').toLowerCase() === currentMood)
            .sort((a, b) => (b[1].time || 0) - (a[1].time || 0));

        const updateShortViewerSoundButton = () => {
            if (!shortViewerSoundBtn || !shortViewerVideo) return;
            shortViewerSoundBtn.textContent = shortViewerVideo.muted ? '🔇 Silencio' : '🔊 Sonido';
        };

        const updateShortViewerNavButtons = () => {
            const hasVideos = currentShortVideos.length > 1;
            if (shortViewerPrevBtn) shortViewerPrevBtn.disabled = !hasVideos;
            if (shortViewerNextBtn) shortViewerNextBtn.disabled = !hasVideos;
        };

        const showShortViewerAt = (index, keepMuted = false) => {
            if (!currentShortVideos.length || !shortViewerVideo) return;

            const total = currentShortVideos.length;
            currentShortIndex = (index + total) % total;
            const [postId, post] = currentShortVideos[currentShortIndex];
            const likeCount = post.likes ? Object.keys(post.likes).length : 0;
            const commentCount = post.commentCount || 0;
            const userLiked = currentUser && post.likes && post.likes[currentUser.uid];
            const previousMuted = keepMuted ? shortViewerVideo.muted : false;

            shortViewerModal.dataset.postId = postId;
            shortViewerCount.textContent = `${currentShortIndex + 1} / ${total}`;
            shortViewerUser.innerHTML = `
                <img src="${post.perfil || 'https://www.w3schools.com/howto/img_avatar.png'}" onerror="this.src='https://www.w3schools.com/howto/img_avatar.png'">
                <div class="short-user-meta">
                    <strong>${post.nick || 'Usuario'}</strong>
                    <span>${formatTime(post.time)}</span>
                </div>
            `;
            shortViewerCaption.textContent = post.text || 'Vídeo corto sin descripción.';
            shortViewerLikeBtn.classList.toggle('liked', Boolean(userLiked));
            shortViewerLikeBtn.textContent = `❤️ ${likeCount}`;
            shortViewerCommentsBtn.textContent = `💬 ${commentCount}`;
            shortViewerLikeBtn.onclick = async (event) => {
                event.stopPropagation();
                await window.toggleLike(postId);
            };
            shortViewerCommentsBtn.onclick = (event) => {
                event.stopPropagation();
                window.openComments(postId);
            };

            shortViewerVideo.pause();
            shortViewerVideo.src = post.video || '';
            shortViewerVideo.loop = true;
            shortViewerVideo.controls = false;
            shortViewerVideo.muted = previousMuted;
            shortViewerVideo.load();
            shortViewerVideo.play().catch(() => {});
            updateShortViewerSoundButton();
            updateShortViewerNavButtons();
        };

        window.openShortViewer = (postId) => {
            currentShortVideos = getShortVideos(lastPostsData).slice(0, 20);
            const index = currentShortVideos.findIndex(([id]) => id === postId);
            if (index < 0 || !shortViewerModal) return;
            shortViewerModal.classList.add('open');
            shortViewerModal.setAttribute('aria-hidden', 'false');
            document.body.classList.add('viewer-open');
            showShortViewerAt(index);
        };

        window.closeShortViewer = () => {
            if (!shortViewerModal) return;
            shortViewerModal.classList.remove('open');
            shortViewerModal.setAttribute('aria-hidden', 'true');
            document.body.classList.remove('viewer-open');
            shortViewerVideo.pause();
        };

        const moveShortViewer = (direction) => {
            if (currentShortVideos.length <= 1) return;
            showShortViewerAt(currentShortIndex + direction, true);
        };

        const syncShortViewer = () => {
            currentShortVideos = getShortVideos(lastPostsData).slice(0, 20);
            if (!shortViewerModal?.classList.contains('open')) return;
            if (!currentShortVideos.length) {
                window.closeShortViewer();
                return;
            }
            const activePostId = shortViewerModal.dataset.postId;
            const nextIndex = currentShortVideos.findIndex(([id]) => id === activePostId);
            showShortViewerAt(nextIndex >= 0 ? nextIndex : 0, true);
        };

        if (shortViewerCloseBtn) shortViewerCloseBtn.onclick = () => window.closeShortViewer();
        if (shortViewerPrevBtn) shortViewerPrevBtn.onclick = (event) => { event.stopPropagation(); moveShortViewer(-1); };
        if (shortViewerNextBtn) shortViewerNextBtn.onclick = (event) => { event.stopPropagation(); moveShortViewer(1); };
        if (shortViewerSoundBtn) {
            shortViewerSoundBtn.onclick = (event) => {
                event.stopPropagation();
                shortViewerVideo.muted = !shortViewerVideo.muted;
                if (shortViewerVideo.paused) shortViewerVideo.play().catch(() => {});
                updateShortViewerSoundButton();
            };
        }
        if (shortViewerVideo) {
            shortViewerVideo.addEventListener('click', (event) => {
                event.stopPropagation();
                if (shortViewerVideo.paused) {
                    shortViewerVideo.play().catch(() => {});
                } else {
                    shortViewerVideo.pause();
                }
            });
        }
        if (shortViewerModal) {
            shortViewerModal.addEventListener('click', (event) => {
                if (event.target === shortViewerModal) {
                    window.closeShortViewer();
                }
            });
        }
        if (shortViewerStage) {
            shortViewerStage.addEventListener('touchstart', (event) => {
                shortViewerTouchStartY = event.changedTouches[0]?.clientY ?? null;
            }, { passive: true });
            shortViewerStage.addEventListener('touchend', (event) => {
                const endY = event.changedTouches[0]?.clientY ?? null;
                if (shortViewerTouchStartY === null || endY === null) return;
                const deltaY = shortViewerTouchStartY - endY;
                if (Math.abs(deltaY) > 60) {
                    moveShortViewer(deltaY > 0 ? 1 : -1);
                }
                shortViewerTouchStartY = null;
            }, { passive: true });
        }
        window.addEventListener('keydown', (event) => {
            if (!shortViewerModal?.classList.contains('open')) return;
            if (event.key === 'Escape') window.closeShortViewer();
            if (event.key === 'ArrowUp' || event.key === 'ArrowLeft') moveShortViewer(-1);
            if (event.key === 'ArrowDown' || event.key === 'ArrowRight') moveShortViewer(1);
        });

        // ── Render video feed con IntersectionObserver (lazy + autoplay) ──
        let videoObserver = null;

        let globalMuted = true; // empieza silenciado, el usuario activa con el botón

        const renderVideoFeed = (postsMap = {}) => {
            if (!videoFeed) return;

            const videos = getShortVideos(postsMap);
            currentShortVideos = videos;
            videoFeed.innerHTML = '';

            if (!videos.length) {
                videoFeed.innerHTML = `
                    <div style="height:100dvh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:rgba(255,255,255,0.5);">
                        <div style="font-size:48px;">🎬</div>
                        <div style="font-size:15px;">No hay videos aún</div>
                    </div>`;
                return;
            }

            if (videoObserver) videoObserver.disconnect();

            videoObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const vid = entry.target.querySelector('video');
                    const bar = entry.target.querySelector('.video-progress-bar');
                    if (!vid) return;

                    if (entry.isIntersecting && entry.intersectionRatio > 0.7) {
                        // Lazy: cargar src solo al entrar en pantalla
                        if (!vid.src && vid.dataset.src) {
                            vid.src = vid.dataset.src;
                            vid.load();
                        }
                        vid.muted = globalMuted;
                        vid.play().catch(() => {});

                        // Barra de progreso
                        if (bar) {
                            vid.ontimeupdate = () => {
                                const pct = vid.duration ? (vid.currentTime / vid.duration) * 100 : 0;
                                bar.style.width = pct + '%';
                            };
                        }
                    } else {
                        vid.pause();
                        if (bar) bar.style.width = '0%';
                    }
                });
            }, { threshold: 0.7 });

            videos.forEach(([postId, post]) => {
                const likeCount    = post.likes ? Object.keys(post.likes).length : 0;
                const commentCount = post.commentCount || 0;
                const userLiked    = currentUser && post.likes && post.likes[currentUser.uid];

                const item = document.createElement('div');
                item.className = 'video-feed-item';
                item.innerHTML = `
                    <video
                        data-src="${post.video}"
                        playsinline loop preload="none"
                        id="vid-${postId}"
                    ></video>

                    <div class="video-play-indicator" id="vpi-${postId}"></div>

                    <!-- Barra de progreso -->
                    <div class="video-progress">
                        <div class="video-progress-bar"></div>
                    </div>

                    <!-- Info izquierda abajo -->
                    <div class="video-feed-info">
                        <div class="video-feed-user">
                            <img src="${post.perfil || 'https://www.w3schools.com/howto/img_avatar.png'}"
                                 onerror="this.src='https://www.w3schools.com/howto/img_avatar.png'">
                            <div class="video-feed-nick">@${post.nick || 'usuario'}</div>
                        </div>
                        <div class="video-feed-caption">${post.text || ''}</div>
                    </div>

                    <!-- Botones laterales derecha estilo TikTok -->
                    <div class="video-side-btns">
                        <div class="vsb">
                            <button class="vsb-icon ${userLiked ? 'liked' : ''}"
                                id="vlike-${postId}"
                                onclick="event.stopPropagation(); toggleLike('${postId}')">❤️</button>
                            <span class="vsb-label" id="vlabel-${postId}">${likeCount}</span>
                        </div>
                        <div class="vsb">
                            <button class="vsb-icon"
                                onclick="event.stopPropagation(); openComments('${postId}')">💬</button>
                            <span class="vsb-label">${commentCount}</span>
                        </div>
                        <div class="vsb">
                            <button class="vsb-icon" id="snd-${postId}"
                                onclick="event.stopPropagation(); toggleGlobalSound()">${globalMuted ? '🔇' : '🔊'}</button>
                            <span class="vsb-label">${globalMuted ? 'Sonido' : 'Silencio'}</span>
                        </div>
                    </div>
                `;

                const vid = item.querySelector('video');
                const indicator = item.querySelector('.video-play-indicator');

                // Tap para play/pause + mostrar indicador
                item.addEventListener('click', (e) => {
                    if (e.target.closest('.vsb-icon') || e.target.closest('button')) return;
                    if (vid.paused) {
                        vid.play().catch(() => {});
                        indicator.textContent = '';
                        indicator.classList.remove('show');
                    } else {
                        vid.pause();
                        indicator.textContent = '⏸';
                        indicator.classList.add('show');
                        setTimeout(() => indicator.classList.remove('show'), 900);
                    }
                });

                // Al tocar el video activa el sonido si estaba silenciado
                // Detectar orientación del video al cargar metadatos
                vid.addEventListener('loadedmetadata', () => {
                    const isHorizontal = vid.videoWidth > vid.videoHeight;
                    item.classList.toggle('is-horizontal', isHorizontal);
                });

                vid.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (globalMuted) {
                        toggleGlobalSound();
                    } else {
                        if (vid.paused) vid.play().catch(() => {});
                        else vid.pause();
                    }
                });

                videoFeed.appendChild(item);
                videoObserver.observe(item);
            });
        };

        // ── Sonido global para todos los videos ──
        window.toggleGlobalSound = function() {
            globalMuted = !globalMuted;
            document.querySelectorAll('#video-feed video').forEach(v => { v.muted = globalMuted; });
            document.querySelectorAll('[id^="snd-"]').forEach(btn => {
                btn.textContent = globalMuted ? '🔇' : '🔊';
                const lbl = btn.closest('.vsb')?.querySelector('.vsb-label');
                if (lbl) lbl.textContent = globalMuted ? 'Sonido' : 'Silencio';
            });
            // Botón global superior
            const gBtn = document.getElementById('global-sound-btn');
            if (gBtn) gBtn.textContent = globalMuted ? '🔇' : '🔊';
        };

        // Compatibilidad: renderShortVideos ahora llama a renderVideoFeed
        const renderShortVideos = (postsMap = {}) => {
            renderVideoFeed(postsMap);
        };

        const loadComments = (postId) => {
            const commentsRef = ref(db, `ListPosts/${postId}/comments`);
            const list = document.getElementById('comments-list');
            onValue(commentsRef, (snap) => {
                list.innerHTML = "";
                if (snap.exists()) {
                    Object.values(snap.val()).forEach(c => {
                        const div = document.createElement('div');
                        div.className = 'comment-item';
                        div.innerHTML = `
                            <div class="comment-avatar">
                                <img src="${c.perfil || 'https://www.w3schools.com/howto/img_avatar.png'}" onerror="this.src='https://www.w3schools.com/howto/img_avatar.png'">
                            </div>
                            <div class="comment-bubble"><strong>${c.nick || 'Usuario'}</strong>${c.text}</div>
                        `;
                        list.appendChild(div);
                    });
                    list.scrollTop = list.scrollHeight;
                } else {
                    list.innerHTML = "<p style='text-align:center; color:#888;'>No hay comentarios aún.</p>";
                }
            });
        };

        document.getElementById('send-comment-btn').onclick = async () => {
            const input = document.getElementById('comment-input');
            const text = input.value.trim();
            if (!text || !activePostId || !currentUser) return;

            const userRef = ref(db, `Users/${currentUser.uid}`);
            const userSnap = await get(userRef);
            const userData = userSnap.exists() ? userSnap.val() : { nick: "Usuario" };

            const newCommentRef = push(ref(db, `ListPosts/${activePostId}/comments`));
            await set(newCommentRef, {
                uid: currentUser.uid,
                nick: userData.nick || "Usuario",
                perfil: userData.perfil || "https://www.w3schools.com/howto/img_avatar.png",
                text: text,
                time: Date.now()
            });

            const postRef = ref(db, `ListPosts/${activePostId}`);
            runTransaction(postRef, (post) => {
                if (post) post.commentCount = (post.commentCount || 0) + 1;
                return post;
            });
            input.value = "";
        };

        window.votePoll = async (postId, optionKey) => {
            if (!currentUser) return;
            const pollRef = ref(db, `ListPosts/${postId}/poll`);
            const voteRef = ref(db, `ListPosts/${postId}/poll/userVotes/${currentUser.uid}`);
            const voteSnap = await get(voteRef);
            if (voteSnap.exists()) return;

            await runTransaction(pollRef, (poll) => {
                if (poll) {
                    if (!poll.userVotes) poll.userVotes = {};
                    poll.userVotes[currentUser.uid] = optionKey;
                    if (poll.options && poll.options[optionKey]) {
                        poll.options[optionKey].votes = (poll.options[optionKey].votes || 0) + 1;
                        poll.totalVotes = (poll.totalVotes || 0) + 1;
                    }
                }
                return poll;
            });
        };

        // ── Tab switcher ──
        let currentTab = 'posts';
        window.switchTab = function(tab) {
            currentTab = tab;
            const postFeed   = document.getElementById('post-feed');
            const vFeed      = document.getElementById('video-feed');
            const tabPosts   = document.getElementById('tab-posts');
            const tabVideos  = document.getElementById('tab-videos');
            const sortCont   = document.querySelector('.sort-container');
            const gSoundBtn  = document.getElementById('global-sound-btn');

            if (tab === 'videos') {
                postFeed?.classList.remove('active');
                vFeed?.classList.add('active');
                tabPosts?.classList.remove('active');
                tabVideos?.classList.add('active');
                if (tabPosts) { tabPosts.style.background = 'none'; tabPosts.style.color = 'rgba(255,255,255,0.5)'; }
                if (tabVideos) { tabVideos.style.background = 'rgba(255,255,255,0.15)'; tabVideos.style.color = 'white'; }
                // Ocultar tabs y sort mientras está en modo video (pantalla completa)
                if (sortCont) sortCont.style.display = 'none';
                // Mostrar botón de sonido global
                if (gSoundBtn) gSoundBtn.style.display = 'flex';
                const backBtn = document.getElementById('video-back-btn');
                if (backBtn) backBtn.style.display = 'flex';
                // Iniciar primer video
                const firstItem = vFeed?.querySelector('.video-feed-item');
                const firstVid  = firstItem?.querySelector('video');
                if (firstVid) {
                    if (!firstVid.src && firstVid.dataset.src) firstVid.src = firstVid.dataset.src;
                    firstVid.muted = globalMuted;
                    firstVid.play().catch(() => {});
                }
            } else {
                vFeed?.classList.remove('active');
                postFeed?.classList.add('active');
                tabVideos?.classList.remove('active');
                tabPosts?.classList.add('active');
                if (tabVideos) { tabVideos.style.background = 'none'; tabVideos.style.color = 'rgba(255,255,255,0.5)'; }
                if (tabPosts) { tabPosts.style.background = 'rgba(255,255,255,0.15)'; tabPosts.style.color = 'white'; }
                if (sortCont) sortCont.style.display = '';
                if (gSoundBtn) gSoundBtn.style.display = 'none';
                const backBtn2 = document.getElementById('video-back-btn');
                if (backBtn2) backBtn2.style.display = 'none';
                // Pausar todos los videos
                vFeed?.querySelectorAll('video').forEach(v => v.pause());
            }
        };

        let postsUnsubscribe = null;
        const loadPosts = () => {
            console.log("Iniciando carga de posts...");
            // Desuscribir del listener anterior si existe
            if (postsUnsubscribe) {
                postsUnsubscribe();
            }
            const postsRef = ref(db, "ListPosts");
            postsUnsubscribe = onValue(postsRef, (snapshot) => {
                container.innerHTML = "";
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    lastPostsData = data || {};
                    renderShortVideos(lastPostsData);
                    let postIds = Object.keys(data);
                    
                    // Ordenar posts según el criterio seleccionado
                    if (currentSortOrder === 'popular') {
                        postIds.sort((a, b) => Object.keys(data[b].likes || {}).length - Object.keys(data[a].likes || {}).length);
                    } else if (currentSortOrder === 'oldest') {
                        postIds.sort((a, b) => (data[a].time || 0) - (data[b].time || 0));
                    } else {
                        postIds.reverse(); // recientes primero
                    }
                    
                    let hasVisiblePosts = false;

                    postIds.forEach(postId => {
                        const post = data[postId];

                        if (isPostExpired(post)) {
                            deleteExpiredPost(postId);
                            return;
                        }

                        const postMood = (post.mood || "").toLowerCase();
                        const matchesMood = currentMood === 'all' || postMood === currentMood;
                        if (!matchesMood) return;
                        hasVisiblePosts = true;

                        const card = document.createElement('div');
                        card.className = 'post-card';
                        const likeCount = post.likes ? Object.keys(post.likes).length : 0;
                        const commentCount = post.commentCount || 0;
                        const userLiked = currentUser && post.likes && post.likes[currentUser.uid];
                        const userCommented = currentUser && post.comments && Object.values(post.comments).some(c => c.uid === currentUser.uid);

                        let html = `
                            <div class="post-header">
                                <div class="post-avatar"><img src="${post.perfil || 'https://www.w3schools.com/howto/img_avatar.png'}"></div>
                                <div class="post-meta">
                                    <div class="post-nick-container">
                                        <span class="post-nick">${post.nick || 'Usuario'}</span>
                                        <span class="platform-tag ${(post.multi || 'web').toLowerCase()}"></span>
                                    </div>
                                    <span class="post-time">${formatTime(post.time)}</span>
                                </div>
                            </div>
                            <div class="post-body">${post.text || ''}</div>
                        `;

                        if (post.poll && post.poll.options) {
                            const poll = post.poll;
                            const total = poll.totalVotes || 0;
                            html += `<div class="poll-container">`;
                            Object.keys(poll.options).forEach(optKey => {
                                const opt = poll.options[optKey];
                                const votes = opt.votes || 0;
                                const percent = total > 0 ? Math.round((votes / total) * 100) : 0;
                                html += `
                                    <div class="poll-option" onclick="votePoll('${postId}', '${optKey}')">
                                        <div class="poll-bar" style="width: ${percent}%"></div>
                                        <span class="poll-text">${opt.text}</span>
                                        <span class="poll-percent">${percent}% (${votes})</span>
                                    </div>
                                `;
                            });
                            html += `</div>`;
                        }

                        if (post.image) {
                            html += `<img src="${post.image}" class="post-published-image">`;
                        }

                        // Posts con video: no mostrar video en publicaciones

                        // Reacciones
                        const postReactions = JSON.parse(localStorage.getItem('postReactions')) || {};
                        const postReactionCounts = postReactions[postId] || {};
                        let reactionsHtml = '';
                        ['\ud83d\ude02', '\ud83d\ude0d', '\ud83d\ude22', '\ud83d\ude21', '\ud83d\udd25'].forEach(emoji => {
                            reactionsHtml += '<button class="reaction-btn" onclick="addReaction(\'' + postId + '\', \'' + emoji + '\')">' + emoji + ' <span class="reaction-count">' + (postReactionCounts[emoji] || 0) + '</span></button>';
                        });

                        // Temporizador
                        let timerHtml = '';
                        const postExpiresAt = getPostExpiration(post);
                        if (postExpiresAt) {
                            const timeLeft = postExpiresAt - Date.now();
                            if (timeLeft > 0) {
                                const hours = Math.floor(timeLeft / (1000 * 60 * 60));
                                const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
                                timerHtml = '<div class="timer-badge" data-timer="' + postExpiresAt + '">\u23f0 Expira en ' + hours + 'h ' + minutes + 'm</div>';
                            }
                        }

                        html += timerHtml;
                        html += '<div class="post-footer">';
                        html += '<button class="action-btn ' + (userLiked ? 'liked' : '') + '" onclick="toggleLike(\'' + postId + '\')"><img src="' + (userLiked ? 'https://img.icons8.com/ios-filled/50/FF0000/like.png' : 'https://img.icons8.com/ios/50/65676b/like.png') + '"><span>' + likeCount + '</span></button>';
                        html += '<button class="action-btn ' + (userCommented ? 'commented' : '') + '" onclick="openComments(\'' + postId + '\')"><img src="' + (userCommented ? 'https://img.icons8.com/ios-filled/50/007AFF/comments.png' : 'https://img.icons8.com/ios/50/65676b/comments.png') + '"><span>' + commentCount + '</span></button>';
                        html += '</div>';
                        html += '<div class="reactions-container">' + reactionsHtml + '</div>';
                        card.innerHTML = html;
                        card.setAttribute('data-mood', postMood);
                        card.setAttribute('data-time', post.time || 0);
                        card.setAttribute('data-likes', likeCount);
                        card.setAttribute('data-post-id', postId);
                        const expiresAt = getPostExpiration(post);
                        if (expiresAt) {
                            card.setAttribute('data-expires-at', expiresAt);
                        }
                        container.appendChild(card);
                    });

                    if (!hasVisiblePosts) {
                        container.innerHTML = `<p style='text-align:center; color:#888; margin-top: 50px;'>No hay publicaciones con el mood "${currentMood}" aún.</p>`;
                    }
                } else {
                    lastPostsData = {};
                    renderShortVideos({});
                    container.innerHTML = "<p style='text-align:center; color:#888;'>No hay publicaciones aún.</p>";
                }
                // Actualizar desaf\u00edo semanal
                if (typeof updateWeeklyChallenge === 'function') {
                    try { updateWeeklyChallenge(lastPostsData); } catch(e) {}
                }
            });
        };

        // ===== PARTÍCULAS FLOTANTES =====
        const particlesConfig = {
            hot: { emoji: '🔥', color: '#ff4b2b', count: 15 },
            relax: { emoji: '🌊', color: '#2193b0', count: 12 },
            drama: { emoji: '🎭', color: '#8e2de2', count: 10 },
            tech: { emoji: '💻', color: '#00f2fe', count: 14 }
        };

        let currentParticles = [];

        const createParticle = (mood) => {
            const config = particlesConfig[mood] || particlesConfig.hot;
            const container = document.getElementById('particles-container');
            
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.textContent = config.emoji;
            particle.style.fontSize = Math.random() * 20 + 15 + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.opacity = Math.random() * 0.5 + 0.3;
            
            const duration = Math.random() * 8 + 6;
            const tx = (Math.random() - 0.5) * 200;
            particle.style.setProperty('--tx', tx + 'px');
            particle.style.animation = `float-up ${duration}s linear infinite`;
            
            container.appendChild(particle);
            currentParticles.push(particle);
            
            setTimeout(() => {
                particle.remove();
                currentParticles = currentParticles.filter(p => p !== particle);
            }, duration * 1000);
        };

        const startParticles = (mood) => {
            // Limpiar partículas anteriores
            currentParticles.forEach(p => p.remove());
            currentParticles = [];
            
            const config = particlesConfig[mood];
            if (!config) return;
            
            // Crear partículas iniciales
            for (let i = 0; i < config.count; i++) {
                setTimeout(() => createParticle(mood), i * 200);
            }
            
            // Crear nuevas partículas cada 2 segundos
            const particleInterval = setInterval(() => {
                if (currentMood !== mood) {
                    clearInterval(particleInterval);
                    return;
                }
                createParticle(mood);
            }, 2000);
        };

        // Iniciar partículas cuando cambia el mood
        const originalMoodItems = document.querySelectorAll('.mood-item');
        originalMoodItems.forEach(item => {
            item.addEventListener('click', () => {
                setTimeout(() => {
                    const mood = item.getAttribute('data-mood');
                    if (mood !== 'all') {
                        startParticles(mood);
                    } else {
                        currentParticles.forEach(p => p.remove());
                        currentParticles = [];
                    }
                }, 100);
            });
        });

        // Iniciar con el primer mood
        startParticles('hot');

        // DESAFIO SEMANAL Y ORDENAMIENTO
        let currentSortOrder = 'recent';
        window.setSortOrder = (order) => {
            currentSortOrder = order;
            document.querySelectorAll('.sort-btn').forEach(btn => {
                const isActive = btn.getAttribute('onclick') === `setSortOrder('${order}')`;
                btn.classList.toggle('active', isActive);
            });
            loadPosts();
        };

        const WEEKLY_CHALLENGES = [
            {
                id: 'hot-posts',
                description: 'Publica 5 posts en Hot',
                target: 5,
                getProgress: (posts) => posts.filter(post => isOwnPost(post) && isThisWeek(post.time) && normalizeMood(post.mood) === 'hot').length
            },
            {
                id: 'relax-posts',
                description: 'Publica 3 posts en Relax',
                target: 3,
                getProgress: (posts) => posts.filter(post => isOwnPost(post) && isThisWeek(post.time) && normalizeMood(post.mood) === 'relax').length
            },
            {
                id: 'tech-posts',
                description: 'Publica 3 posts en Tech',
                target: 3,
                getProgress: (posts) => posts.filter(post => isOwnPost(post) && isThisWeek(post.time) && normalizeMood(post.mood) === 'tech').length
            },
            {
                id: 'comments',
                description: 'Escribe 8 comentarios esta semana',
                target: 8,
                getProgress: (posts) => posts.reduce((total, post) => {
                    const comments = Object.values(post.comments || {});
                    return total + comments.filter(comment => comment?.uid === currentUser?.uid && isThisWeek(comment?.time)).length;
                }, 0)
            },
            {
                id: 'polls',
                description: 'Crea 2 encuestas esta semana',
                target: 2,
                getProgress: (posts) => posts.filter(post => isOwnPost(post) && isThisWeek(post.time) && post.poll && post.poll.options).length
            }
        ];

        const getStartOfWeek = (date = new Date()) => {
            const d = new Date(date);
            const day = (d.getDay() + 6) % 7;
            d.setHours(0, 0, 0, 0);
            d.setDate(d.getDate() - day);
            return d;
        };

        const getWeekKey = () => getStartOfWeek().toISOString().slice(0, 10);
        const getWeekIndex = () => Math.floor(getStartOfWeek().getTime() / (7 * 24 * 60 * 60 * 1000));
        const normalizeMood = (mood) => String(mood || '').trim().toLowerCase();
        const isThisWeek = (timestamp) => {
            if (!timestamp) return false;
            const start = getStartOfWeek();
            const end = new Date(start);
            end.setDate(end.getDate() + 7);
            const time = Number(timestamp);
            return !Number.isNaN(time) && time >= start.getTime() && time < end.getTime();
        };
        const isOwnPost = (post) => {
            if (!currentUser || !post) return false;
            const possibleOwnerIds = [post.uid, post.userId, post.authorId, post.ownerId, post.createdBy].filter(Boolean);
            if (possibleOwnerIds.includes(currentUser.uid)) return true;

            const profileNick = String(currentUserProfile?.nick || '').trim().toLowerCase();
            const postNick = String(post.nick || post.username || '').trim().toLowerCase();
            return profileNick && postNick && profileNick === postNick;
        };
        const getActiveWeeklyChallenge = () => {
            const index = ((getWeekIndex() % WEEKLY_CHALLENGES.length) + WEEKLY_CHALLENGES.length) % WEEKLY_CHALLENGES.length;
            return WEEKLY_CHALLENGES[index];
        };

        const updateWeeklyChallenge = (postsData = lastPostsData) => {
            const descEl = document.getElementById('challenge-desc');
            const barEl = document.getElementById('challenge-bar');
            const countEl = document.getElementById('challenge-count');
            if (!descEl || !barEl || !countEl) return;

            const challenge = getActiveWeeklyChallenge();
            const posts = Object.values(postsData || {});
            const rawProgress = currentUser ? challenge.getProgress(posts) : 0;
            const progress = Math.max(0, rawProgress);
            const percent = Math.min((progress / challenge.target) * 100, 100);
            const completed = progress >= challenge.target;

            descEl.textContent = challenge.description;
            barEl.style.width = percent + '%';
            barEl.style.background = completed
                ? 'linear-gradient(90deg, #00c853, #b2ff59)'
                : 'linear-gradient(90deg, #ff4b2b, #ff416c)';
            countEl.textContent = completed
                ? `✅ Completado (${Math.min(progress, challenge.target)}/${challenge.target})`
                : `${progress}/${challenge.target} completado`;

            const completionKey = `weeklyChallengeCompleted:${getWeekKey()}:${challenge.id}`;
            if (completed && !localStorage.getItem(completionKey)) {
                localStorage.setItem(completionKey, 'true');
                if (typeof showNotification === 'function') {
                    showNotification('¡Has completado el desafío semanal!');
                }
            }
        };

        // NOTIFICACIONES PUSH
        window.showNotification = (message) => {
            const toast = document.createElement('div');
            toast.className = 'notification-toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        };

        // REACCIONES (toggle: 1 al presionar, 0 al volver a presionar)
        const reactionEmojis = ['😂', '😍', '😢', '😡', '🔥'];
        window.addReaction = (postId, emoji) => {
            const reactions = JSON.parse(localStorage.getItem('postReactions')) || {};
            if (!reactions[postId]) reactions[postId] = {};
            
            // Toggle: si ya tiene 1, poner 0. Si tiene 0, poner 1.
            if (reactions[postId][emoji] && reactions[postId][emoji] > 0) {
                reactions[postId][emoji] = 0;
            } else {
                reactions[postId][emoji] = 1;
            }
            localStorage.setItem('postReactions', JSON.stringify(reactions));
            
            // Actualizar solo el contador y estilo sin recargar
            const buttons = document.querySelectorAll('[data-post-id="' + postId + '"] .reaction-btn');
            buttons.forEach(btn => {
                if (btn.textContent.includes(emoji)) {
                    const countSpan = btn.querySelector('.reaction-count');
                    if (countSpan) {
                        countSpan.textContent = reactions[postId][emoji];
                    }
                    if (reactions[postId][emoji] > 0) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                }
            });
            
            if (reactions[postId][emoji] > 0) {
                showNotification('Reaccion anadida!');
            } else {
                showNotification('Reaccion eliminada');
            }
        };

        // loadFeed eliminado - se usa loadPosts directamente

        // ===== SKELETON LOADING =====
        const showSkeletonLoading = () => {
            const container = document.getElementById('post-feed');
            container.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const skeleton = document.createElement('div');
                skeleton.className = 'post-card';
                skeleton.innerHTML = `
                    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                        <div class="skeleton skeleton-avatar"></div>
                        <div style="flex: 1;">
                            <div class="skeleton skeleton-text" style="width: 60%;"></div>
                            <div class="skeleton skeleton-text" style="width: 40%;"></div>
                        </div>
                    </div>
                    <div class="skeleton skeleton-image"></div>
                    <div class="skeleton skeleton-text" style="width: 100%;"></div>
                    <div class="skeleton skeleton-text" style="width: 80%;"></div>
                `;
                container.appendChild(skeleton);
            }
        };

        // ===== TEMPORIZADOR EN POSTS =====
        const updateTimers = () => {
            const postCards = document.querySelectorAll('.post-card');
            postCards.forEach(card => {
                const timerElement = card.querySelector('[data-timer]');
                if (!timerElement) return;

                const expiresAt = parseInt(timerElement.getAttribute('data-timer'));
                const now = Date.now();
                const timeLeft = expiresAt - now;
                const postId = card.getAttribute('data-post-id');

                if (timeLeft <= 0) {
                    card.remove();
                    deleteExpiredPost(postId);
                    return;
                }

                const hours = Math.floor(timeLeft / (1000 * 60 * 60));
                const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
                timerElement.textContent = '⏰ Expira en ' + hours + 'h ' + minutes + 'm';
            });
        };
        updateTimers();
        setInterval(updateTimers, 1000);

        // ===== SHAKE PARA SORPRESA =====
        let lastShakeTime = 0;
        window.addEventListener('devicemotion', (event) => {
            const acceleration = event.accelerationIncludingGravity;
            const x = acceleration.x || 0;
            const y = acceleration.y || 0;
            const z = acceleration.z || 0;
            
            const shakeStrength = Math.sqrt(x * x + y * y + z * z);
            
            if (shakeStrength > 30) {
                const now = Date.now();
                if (now - lastShakeTime > 1000) {
                    lastShakeTime = now;
                    showRandomPost();
                }
            }
        });

        window.showRandomPost = () => {
            const container = document.getElementById('post-feed');
            const posts = container.querySelectorAll('.post-card');
            
            if (posts.length === 0) {
                showNotification('No hay posts para mostrar');
                return;
            }
            
            posts.forEach(post => post.classList.remove('shake-animation'));
            
            const randomPost = posts[Math.floor(Math.random() * posts.length)];
            randomPost.classList.add('shake-animation');
            randomPost.scrollIntoView({ behavior: 'smooth', block: 'center' });
            showNotification('Sorpresa encontrada!');
            
            setTimeout(() => randomPost.classList.remove('shake-animation'), 500);
        };

        // Mostrar boton de shake en pantalla
        const shakeBtn = document.createElement('button');
        shakeBtn.textContent = '🎲 Sorpresa';
        shakeBtn.style.cssText = 'position: fixed; bottom: 120px; right: 20px; padding: 12px 16px; background: linear-gradient(135deg, #ff4b2b, #ff416c); border: none; border-radius: 20px; color: white; font-weight: 700; cursor: pointer; z-index: 999; box-shadow: 0 4px 12px rgba(255,75,43,0.4);';
        shakeBtn.onclick = () => showRandomPost();
        document.body.appendChild(shakeBtn);
    </script>
